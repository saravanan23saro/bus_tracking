<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#2563EB">
  <link rel="manifest" href="manifest.json">
  <title>Student — Bus Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="loader.css" />
</head>
<body data-page="student">
  <header class="dash-header">
    <div class="dash-header__left">
      <span class="dash-logo" aria-hidden="true">🚌</span>
      <div class="dash-title-wrap">
        <h1 class="dash-title">Student Dashboard</h1>
        <p class="dash-subtitle">Track your bus</p>
      </div>
    </div>
    <div class="dash-header__center">
      <input type="search" class="dash-search" id="headerSearch" placeholder="Search bus ID…" aria-label="Search bus" />
    </div>
    <div class="dash-header__right">
      <button type="button" class="dash-icon-btn" id="notifBell" title="Arrival alerts">🔔</button>
      <button type="button" class="dash-icon-btn" id="themeToggle" aria-label="Toggle theme">🌙</button>
      <div class="dash-user">
        <span class="dash-user__avatar" id="userAvatar">S</span>
        <div class="dash-user__meta">
          <span class="dash-user__name" id="userName">Student</span>
          <span class="dash-user__role" id="userRole">Student</span>
        </div>
      </div>
      <button type="button" class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button>
    </div>
  </header>

  <div class="dash-banner" id="httpsWarning" hidden>
    ⚠️ Geolocation works best on HTTPS or localhost.
  </div>

  <main class="dash-main">
    <section class="card student-search-bar">
      <div class="card__body">
        <input class="input" id="busSelect" placeholder="Bus ID (e.g. bus1)" aria-label="Bus ID" />
        <button type="button" class="btn btn-primary" id="watchBtn">▶ Watch Bus</button>
        <button type="button" class="btn btn-ghost is-hidden" id="stopBtn">Stop</button>
        <button type="button" class="btn btn-ghost is-hidden" id="notifyBtn" title="Arrival notification">🔔 Alert</button>
      </div>
    </section>

    <div class="inline-error" id="errorNotice">
      <span id="errorText"></span>
      <button type="button" class="btn btn-danger btn-sm" id="retryBtn">Retry</button>
    </div>

    <section class="card map-card" data-map-card="map" style="margin-bottom:24px">
      <div class="card__header"><h2 class="card__title">Live Bus Map</h2></div>
      <div class="map-card__inner">
        <div class="map-skeleton">Loading map…</div>
        <div id="map" aria-label="Bus tracking map"></div>
      </div>
    </section>

    <section class="tracking-grid" aria-label="Primary metrics">
      <article class="card track-card">
        <div class="track-card__icon">🚗</div>
        <div class="track-card__label">Speed</div>
        <div class="track-card__value" id="speed">—</div>
      </article>
      <article class="card track-card">
        <div class="track-card__icon">📌</div>
        <div class="track-card__label">Distance</div>
        <div class="track-card__value" id="distance">—</div>
      </article>
      <article class="card track-card">
        <div class="track-card__icon">⏱</div>
        <div class="track-card__label">ETA</div>
        <div class="track-card__value" id="eta">—</div>
      </article>
    </section>

    <section class="tracking-grid tracking-grid--secondary" aria-label="Status details">
      <article class="card track-card">
        <div class="track-card__icon">🕐</div>
        <div class="track-card__label">Last Update</div>
        <div class="track-card__value" id="lastUpdated" style="font-size:1rem">—</div>
      </article>
      <article class="card track-card">
        <div class="track-card__icon">📍</div>
        <div class="track-card__label">GPS</div>
        <div class="track-card__value" id="coordinates" style="font-size:0.85rem;font-family:monospace">—</div>
      </article>
      <article class="card track-card">
        <div class="track-card__icon">🚌</div>
        <div class="track-card__label">Bus Status</div>
        <div class="track-card__value" id="busStatus" style="font-size:1rem">Idle</div>
      </article>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/notify.js"></script>
  <script src="js/app.js"></script>
  <script>
    const isSecureOrigin = BusApp.checkSecureOrigin();

    let map = null;
    let marker = null;
    let pulseCircle = null;
    let currentRef = null;
    let trailLine = null;
    let studentLocation = null;
    let currentBusLocation = null;
    let previousBusLocation = null;
    let lastUpdateTime = null;
    let watchTimeoutId = null;
    let notificationEnabled = false;
    let notificationLocation = null;
    let lastSpeedKmh = 0;
    let trackingNotifyShown = false;

    const busInput = document.getElementById('busSelect');
    const watchBtn = document.getElementById('watchBtn');
    const stopBtn = document.getElementById('stopBtn');
    const notifyBtn = document.getElementById('notifyBtn');
    const errorNotice = document.getElementById('errorNotice');
    const errorText = document.getElementById('errorText');
    const retryBtn = document.getElementById('retryBtn');
    const headerSearch = document.getElementById('headerSearch');

    const savedBus = localStorage.getItem('busTracker.busId');
    if (savedBus) busInput.value = savedBus;

    headerSearch.addEventListener('input', function () {
      busInput.value = headerSearch.value;
    });
    busInput.addEventListener('input', function () {
      headerSearch.value = busInput.value;
    });

    if (!firebase.apps || !firebase.apps.length) {
      firebase.initializeApp(window.FIREBASE_CONFIG);
    }
    const database = firebase.database();

    function haversineDistance(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function createBusMarker(latLng) {
      return L.marker(latLng, {
        icon: L.divIcon({
          html: '<div class="bus-marker">🚌</div>',
          className: 'bus-marker-wrapper',
          iconSize: [40, 40],
          iconAnchor: [20, 20]
        })
      });
    }

    function addPulsingCircle(latLng) {
      if (pulseCircle) map.removeLayer(pulseCircle);
      pulseCircle = L.circle(latLng, {
        radius: 100,
        color: '#2563EB',
        weight: 2,
        opacity: 0.35,
        fill: false,
        className: 'pulse-circle'
      }).addTo(map);
    }

    function updateEta(distKm, speedKmh) {
      const etaEl = document.getElementById('eta');
      if (!distKm || distKm <= 0) {
        etaEl.textContent = '—';
        return;
      }
      const speed = speedKmh > 5 ? speedKmh : 25;
      const hours = distKm / speed;
      const mins = Math.round(hours * 60);
      if (mins < 1) etaEl.textContent = '<1 min';
      else if (mins < 60) etaEl.textContent = mins + ' min';
      else etaEl.textContent = Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm';
    }

    function updateInfoPanel(busData) {
      const now = Date.now();
      lastUpdateTime = busData.timestamp || now;
      const secondsAgo = Math.floor((now - lastUpdateTime) / 1000);
      let timeText = 'Just now';
      if (secondsAgo >= 60 && secondsAgo < 3600) timeText = Math.floor(secondsAgo / 60) + 'm ago';
      else if (secondsAgo >= 3600) timeText = Math.floor(secondsAgo / 3600) + 'h ago';
      else if (secondsAgo > 5) timeText = secondsAgo + 's ago';

      document.getElementById('lastUpdated').textContent = timeText;
      document.getElementById('coordinates').textContent =
        busData.lat.toFixed(4) + '°, ' + busData.lng.toFixed(4) + '°';
      document.getElementById('busStatus').textContent = 'Live';

      let distKm = 0;
      if (studentLocation) {
        distKm = haversineDistance(studentLocation[0], studentLocation[1], busData.lat, busData.lng);
        document.getElementById('distance').textContent = distKm.toFixed(2) + ' km';
      }

      if (previousBusLocation && currentBusLocation) {
        const dist = haversineDistance(
          previousBusLocation[0], previousBusLocation[1],
          currentBusLocation[0], currentBusLocation[1]
        );
        const timeSeconds = Math.max(1, (busData.timestamp - (lastUpdateTime - 10000)) / 1000);
        lastSpeedKmh = (dist / timeSeconds) * 3600;
        document.getElementById('speed').textContent = lastSpeedKmh.toFixed(1) + ' km/h';
      }

      updateEta(distKm, lastSpeedKmh);
    }

    function showError(message) {
      errorText.textContent = message;
      errorNotice.classList.add('is-visible');
      document.getElementById('busStatus').textContent = 'No signal';
      BusNotify.error(message);
    }

    function hideError() {
      errorNotice.classList.remove('is-visible');
    }

    function drawTrail(trail) {
      if (!trail || trail.length < 2) return;
      const coords = trail.map(function (point) {
        if (point && point.lat && point.lng) return [point.lat, point.lng];
        if (Array.isArray(point) && point.length === 2) return point;
        return null;
      }).filter(Boolean);
      if (coords.length < 2) return;
      if (trailLine) map.removeLayer(trailLine);
      trailLine = L.polyline(coords, { color: '#F59E0B', weight: 3, opacity: 0.65 }).addTo(map);
    }

    function startWatching() {
      const busId = busInput.value.trim();
      if (!busId) {
        BusNotify.warning('Enter a bus ID to start tracking');
        return;
      }

      if (window.BusLoader) window.BusLoader.show('Fetching bus ' + busId + ' location…');
      hideError();
      watchBtn.classList.add('is-hidden');
      stopBtn.classList.remove('is-hidden');
      notifyBtn.classList.remove('is-hidden');

      if (!studentLocation && navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function (pos) {
            studentLocation = [pos.coords.latitude, pos.coords.longitude];
          },
          function () {
            studentLocation = [10.9974, 76.9589];
          }
        );
      }

      if (currentRef) currentRef.off();
      currentRef = database.ref('buses/' + busId + '/location');

      trackingNotifyShown = false;
      if (watchTimeoutId) clearTimeout(watchTimeoutId);
      watchTimeoutId = setTimeout(function () {
        if (window.BusLoader) window.BusLoader.hide();
        showError('Bus not started yet or no signal.');
      }, 10000);

      currentRef.on('value', function (snap) {
        if (window.BusLoader) window.BusLoader.hide();
        clearTimeout(watchTimeoutId);
        const d = snap.val();

        if (d && d.lat && d.lng) {
          hideError();
          const busLatLng = [d.lat, d.lng];
          currentBusLocation = busLatLng;

          if (map && marker) {
            marker.setLatLng(busLatLng);
            addPulsingCircle(busLatLng);
          } else if (map) {
            marker = createBusMarker(busLatLng);
            marker.addTo(map);
            addPulsingCircle(busLatLng);
          }

          map.setView(busLatLng, 15);
          updateInfoPanel(d);
          if (!trackingNotifyShown) {
            trackingNotifyShown = true;
            BusNotify.info('Tracking started for ' + busId);
          }

          database.ref('buses/' + busId + '/trail').once('value', function (trailSnap) {
            const trail = trailSnap.val();
            if (trail) drawTrail(Array.isArray(trail) ? trail : Object.values(trail));
          });

          if (notificationEnabled && notificationLocation) {
            const dist = haversineDistance(
              busLatLng[0], busLatLng[1],
              notificationLocation[0], notificationLocation[1]
            );
            if (dist < 0.5) {
              showPushNotification('Your bus is arriving soon!');
              notificationEnabled = false;
              notifyBtn.textContent = '🔔 Alert';
              BusNotify.success('Your bus is arriving soon!');
            }
          }

          previousBusLocation = currentBusLocation;
        } else {
          showError('Bus not started yet or no signal.');
        }
      }, function (err) {
        if (window.BusLoader) window.BusLoader.hide();
        showError('Firebase error: ' + err.message);
      });
    }

    function stopWatching() {
      if (!currentRef) return;
      currentRef.off();
      currentRef = null;
      stopBtn.classList.add('is-hidden');
      watchBtn.classList.remove('is-hidden');
      notifyBtn.classList.add('is-hidden');
      if (watchTimeoutId) clearTimeout(watchTimeoutId);
      document.getElementById('busStatus').textContent = 'Stopped';
      BusNotify.warning('Tracking stopped');
    }

    function showPushNotification(title) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('Bus Tracker', { body: title });
      }
    }

    notifyBtn.addEventListener('click', async function () {
      if (!notificationEnabled) {
        if ('Notification' in window) {
          if (Notification.permission === 'granted') enableNotification();
          else if (Notification.permission !== 'denied') {
            const p = await Notification.requestPermission();
            if (p === 'granted') enableNotification();
          } else BusNotify.warning('Enable notifications in browser settings');
        }
      } else {
        notificationEnabled = false;
        notifyBtn.textContent = '🔔 Alert';
        BusNotify.info('Arrival alert disabled');
      }
    });

    function enableNotification() {
      BusNotify.info('Click the map to set your stop for arrival alerts');
      map.once('click', function (e) {
        notificationLocation = [e.latlng.lat, e.latlng.lng];
        notificationEnabled = true;
        notifyBtn.textContent = '🔔 On';
        L.marker(notificationLocation, {
          icon: L.divIcon({
            html: '<div style="font-size:22px">📍</div>',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          })
        }).addTo(map);
        BusNotify.success('Arrival alert zone set');
      });
    }

    document.getElementById('notifBell').addEventListener('click', function () {
      BusNotify.info('Use Alert to get notified when the bus is nearby');
    });

    watchBtn.addEventListener('click', startWatching);
    stopBtn.addEventListener('click', stopWatching);
    retryBtn.addEventListener('click', function () {
      hideError();
      startWatching();
    });

    try {
      map = L.map('map').setView([10.9974, 76.9589], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
      map.whenReady(function () {
        BusApp.hideMapSkeleton('map');
        setTimeout(function () { map.invalidateSize(); }, 100);
      });
    } catch (err) {
      BusNotify.error('Map failed to load');
    }
  </script>
  <script src="loader.js"></script>
</body>
</html>
