<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#2563EB">
  <link rel="manifest" href="manifest.json">
  <title>Driver — Bus Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="loader.css" />
</head>
<body data-page="driver">
  <header class="dash-header">
    <div class="dash-header__left">
      <span class="dash-logo" aria-hidden="true">🚌</span>
      <div class="dash-title-wrap">
        <h1 class="dash-title">Driver Dashboard</h1>
        <p class="dash-subtitle">GPS sharing</p>
      </div>
      <span class="dash-badge">Driver</span>
    </div>
    <div class="dash-header__center">
      <input type="search" class="dash-search" id="headerSearch" placeholder="Search routes…" aria-label="Search" />
    </div>
    <div class="dash-header__right">
      <button type="button" class="dash-icon-btn" id="notifBell" title="Alerts">🔔</button>
      <button type="button" class="dash-icon-btn" id="themeToggle" aria-label="Toggle theme">🌙</button>
      <div class="dash-user">
        <span class="dash-user__avatar" id="userAvatar">D</span>
        <div class="dash-user__meta">
          <span class="dash-user__name" id="userName">Driver</span>
          <span class="dash-user__role" id="userRole">Driver</span>
        </div>
      </div>
      <button type="button" class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button>
    </div>
  </header>

  <div class="dash-banner" id="httpsWarning" hidden>
    ⚠️ Location sharing requires HTTPS or localhost.
  </div>

  <main class="dash-main">
    <section class="driver-top">
      <article class="card driver-info-card">
        <div class="card__header"><h2 class="card__title">Driver Info</h2></div>
        <div class="card__body">
          <div class="field">
            <label for="busInput">Bus ID</label>
            <input class="input" id="busInput" placeholder="e.g. bus1" />
          </div>
          <p class="bus-meta" id="savedBusHint">No bus saved</p>
        </div>
      </article>

      <article class="card driver-controls-card">
        <div class="card__header"><h2 class="card__title">Controls</h2></div>
        <div class="card__body">
          <div class="btn-row">
            <button type="button" class="btn btn-success" id="startBtn">▶ Start Sharing</button>
            <button type="button" class="btn btn-danger is-hidden" id="stopBtn">⏹ Stop Sharing</button>
            <button type="button" class="btn btn-ghost" id="saveBusBtn">💾 Save Bus</button>
            <button type="button" class="btn btn-ghost" id="saveRouteBtn">📍 Save Route</button>
            <button type="button" class="btn btn-accent" id="emergencyBtn">🚨 Emergency</button>
          </div>
        </div>
      </article>
    </section>

    <section class="card map-card" data-map-card="map" style="margin-bottom:24px">
      <div class="card__header"><h2 class="card__title">Live Map</h2></div>
      <div class="map-card__inner">
        <div class="map-skeleton">Loading map…</div>
        <div id="map" aria-label="Driver location map"></div>
      </div>
    </section>

    <section class="metrics-grid" aria-label="Telemetry">
      <article class="card metric-card">
        <div class="metric-card__label">GPS Accuracy</div>
        <div class="progress-bar"><div class="progress-bar__fill" id="accuracyBar"></div></div>
      </article>
      <article class="card metric-card">
        <div class="metric-card__label">Updates Sent</div>
        <div class="metric-card__value" id="updateCount">0</div>
      </article>
      <article class="card metric-card">
        <div class="metric-card__label">Speed</div>
        <div class="metric-card__value" id="speedDisplay">—</div>
      </article>
      <article class="card metric-card">
        <div class="metric-card__label">Status</div>
        <div class="metric-card__value" id="status">Not sharing</div>
      </article>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/notify.js"></script>
  <script src="js/app.js"></script>
  <script>
    const isSecureOrigin = BusApp.checkSecureOrigin();
    const savedBus = localStorage.getItem('busTracker.busId') || '';
    const name = localStorage.getItem('busTracker.name') || 'driver';
    const busInput = document.getElementById('busInput');
    const statusEl = document.getElementById('status');
    const updateCountEl = document.getElementById('updateCount');
    const accuracyBarEl = document.getElementById('accuracyBar');
    const speedDisplayEl = document.getElementById('speedDisplay');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const savedBusHint = document.getElementById('savedBusHint');

    let map = null;
    let marker = null;
    let watchId = null;
    let isSharing = false;
    let updateCount = 0;
    let prevPos = null;
    let prevTime = null;

    if (savedBus) {
      busInput.value = savedBus;
      savedBusHint.textContent = 'Active bus: ' + savedBus;
    }

    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function setStatus(text) { statusEl.textContent = text; }

    document.getElementById('saveBusBtn').addEventListener('click', function () {
      const v = busInput.value.trim();
      if (!v) {
        BusNotify.warning('Enter a bus ID first');
        return;
      }
      localStorage.setItem('busTracker.busId', v);
      savedBusHint.textContent = 'Active bus: ' + v;
      BusNotify.success('Bus ID saved: ' + v);
    });

    document.getElementById('saveRouteBtn').addEventListener('click', function () {
      const busId = localStorage.getItem('busTracker.busId');
      if (!busId) {
        BusNotify.warning('Save a bus ID before saving route');
        return;
      }
      BusNotify.info('Route trail is saved automatically while sharing.');
    });

    document.getElementById('emergencyBtn').addEventListener('click', function () {
      const busId = localStorage.getItem('busTracker.busId');
      if (!busId) {
        BusNotify.error('Save bus ID before sending alert');
        return;
      }
      database.ref('buses/' + busId + '/alert').set({
        type: 'emergency',
        timestamp: Date.now(),
        driver: name
      }).then(function () {
        BusNotify.warning('Emergency alert sent to admin');
      }).catch(function () {
        BusNotify.error('Failed to send emergency alert');
      });
    });

    document.getElementById('notifBell').addEventListener('click', function () {
      BusNotify.info(isSharing ? 'You are sharing location live' : 'Start sharing to broadcast GPS');
    });

    if (!firebase.apps || !firebase.apps.length) {
      firebase.initializeApp(window.FIREBASE_CONFIG);
    }
    const database = firebase.database();

    try {
      map = L.map('map').setView([10.9974, 76.9589], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
      map.whenReady(function () {
        BusApp.hideMapSkeleton('map');
        setTimeout(function () { map.invalidateSize(); }, 100);
      });
    } catch (err) {
      BusNotify.error('Map failed to load');
    }

    function startSharing() {
      if (!navigator.geolocation) {
        BusNotify.error('Geolocation not supported on this device');
        return;
      }
      if (!isSecureOrigin) {
        BusNotify.error('GPS requires HTTPS or localhost');
        return;
      }
      if (watchId !== null) return;

      const busId = localStorage.getItem('busTracker.busId');
      if (!busId) {
        BusNotify.warning('Save your bus ID before starting');
        setStatus('No bus ID');
        return;
      }

      updateCount = 0;
      prevPos = null;
      if (window.BusLoader) window.BusLoader.show('Acquiring GPS signal…');

      watchId = navigator.geolocation.watchPosition(function (pos) {
        if (window.BusLoader) window.BusLoader.hide();

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const accuracy = pos.coords.accuracy;
        const now = Date.now();
        const payload = { lat, lng, timestamp: now, driver: name, accuracy };

        if (prevPos && prevTime) {
          const dist = haversine(prevPos[0], prevPos[1], lat, lng);
          const hours = (now - prevTime) / 3600000;
          if (hours > 0) speedDisplayEl.textContent = (dist / hours).toFixed(1) + ' km/h';
        }
        prevPos = [lat, lng];
        prevTime = now;

        const accuracyPercent = Math.min(100, 100 - (accuracy / 150) * 100);
        accuracyBarEl.style.width = Math.max(20, accuracyPercent) + '%';
        accuracyBarEl.style.background =
          accuracyPercent > 70 ? '#10B981' : accuracyPercent > 40 ? '#F59E0B' : '#EF4444';

        database.ref('buses/' + busId + '/location').set(payload)
          .then(function () {
            updateCount++;
            updateCountEl.textContent = updateCount;
            if (map) {
              if (!marker) marker = L.marker([lat, lng]).addTo(map);
              else marker.setLatLng([lat, lng]);
              map.setView([lat, lng], 15);
            }
            setStatus('Sharing · ' + new Date(now).toLocaleTimeString());
            startBtn.classList.add('is-hidden');
            stopBtn.classList.remove('is-hidden');
            isSharing = true;
            if (updateCount === 1) BusNotify.success('Location shared successfully');

            database.ref('buses/' + busId + '/trail').transaction(function (currentTrail) {
              if (!currentTrail) currentTrail = [];
              else if (!Array.isArray(currentTrail)) currentTrail = Object.values(currentTrail);
              currentTrail.push({ lat, lng, timestamp: now });
              if (currentTrail.length > 20) currentTrail.shift();
              return currentTrail;
            });
          })
          .catch(function () {
            BusNotify.error('Failed to write location');
            setStatus('Write error');
          });
      }, function (err) {
        if (window.BusLoader) window.BusLoader.hide();
        let msg = 'GPS access denied';
        if (err.code === 2) msg = 'Position unavailable';
        else if (err.code === 3) msg = 'GPS timeout';
        BusNotify.error(msg);
        setStatus(msg);
      }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
    }

    function stopSharing() {
      if (watchId === null) return;
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
      isSharing = false;
      const busId = localStorage.getItem('busTracker.busId');
      if (busId) database.ref('buses/' + busId + '/status').set('offline');
      setStatus('Stopped');
      startBtn.classList.remove('is-hidden');
      stopBtn.classList.add('is-hidden');
      updateCount = 0;
      updateCountEl.textContent = '0';
      accuracyBarEl.style.width = '0%';
      speedDisplayEl.textContent = '—';
      BusNotify.warning('Driver stopped sharing location');
    }

    startBtn.addEventListener('click', startSharing);
    stopBtn.addEventListener('click', stopSharing);

    document.addEventListener('visibilitychange', function () {
      if (document.hidden && isSharing && watchId !== null) stopSharing();
    });

    window.addEventListener('beforeunload', function () {
      if (isSharing && watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        const busId = localStorage.getItem('busTracker.busId');
        if (busId) database.ref('buses/' + busId + '/status').set('offline');
      }
    });
  </script>
  <script src="loader.js"></script>
</body>
</html>
